name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend_tp_actions:latest ./springboot/app
      - name: build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend_tp_actions:latest ./angular-app
      - name: push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend_tp_actions:latest
      - name: push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend_tp_actions:latest
      - name: docker compose
        run: docker compose up -d
      - name: Wait for containers
        run: sleep 20
      - name: Wait for MySQL
        run: |
                for i in {1..30}; do
                  docker exec mysql mysql -uroot -proot -e "SELECT 1" && break
                  echo "Waiting for MySQL..."
                  sleep 3
                done
      - name: Check running containers
        run: docker ps
      - name: Show container logs
        run: docker compose logs
      - name: Test backend endpoint
        run: curl -f http://localhost:8081
      - name: Test frontend endpoint
        run: curl -f http://localhost:4200
